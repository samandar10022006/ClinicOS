version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dmed
      POSTGRES_PASSWORD: dmed123
      POSTGRES_DB: dmed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dmed_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmed"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dmed_network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://dmed:dmed123@postgres:5432/dmed
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: ${EMAIL_USER:-your-email@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS:-your-app-password}
      EMR_API_URL: http://localhost:8080/api
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./ai-model:/ai-model
    networks:
      - dmed_network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dmed_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dmed_network

volumes:
  postgres_data:

networks:
  dmed_network:
    driver: bridge
