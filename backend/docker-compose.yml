version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dmed
      POSTGRES_PASSWORD: dmed123
      POSTGRES_DB: dmed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dmed_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dmed_network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://dmed:dmed123@postgres:5432/dmed
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - dmed_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dmed_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - dmed_network

volumes:
  postgres_data:

networks:
  dmed_network:
    driver: bridge